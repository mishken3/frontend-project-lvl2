env:
  es2021: true
  node: true
  jest/globals: true
extends:
  - airbnb-base
plugins: ['jest']
parserOptions:
  ecmaVersion: latest
  sourceType: module
rules:
  no-console: off
  # import/extensions: off
  import/extensions: # FIXME: remove when rule will be adjusted for new nodejs version
    - error
    - ignorePackages
    - js: always
  no-underscore-dangle: [2, { 'allow': ['__filename', '__dirname'] }]
